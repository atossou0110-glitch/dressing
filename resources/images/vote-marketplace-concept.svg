  <text x="992" y="600" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="12">Fauteuil Luna</text>
  <rect x="992" y="620" width="320" height="24" rx="12" fill="#0f172a" />
  <rect x="992" y="620" width="170" height="24" rx="12" fill="#38bdf8" />
  <text x="992" y="640" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="12">Table basse Nova</text>
  <rect x="992" y="660" width="320" height="24" rx="12" fill="#0f172a" />
  <rect x="992" y="660" width="210" height="24" rx="12" fill="#a78bfa" />
  <text x="992" y="680" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="12">Suspension Glow</text>
