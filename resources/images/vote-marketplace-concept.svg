  <text x="80" y="250" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="18">Mets en avant chaque produit avec son score et son potentiel marché.</text>
  <rect x="80" y="290" width="260" height="52" rx="26" fill="#0f172a" />
