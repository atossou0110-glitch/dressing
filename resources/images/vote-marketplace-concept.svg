  <rect x="430" y="718" width="110" height="38" rx="19" fill="#14b8a6" />
  <text x="455" y="744" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700">+ Voter</text>

  <rect x="80" y="800" width="380" height="90" rx="22" fill="#1f2937" />
  <rect x="90" y="816" width="74" height="74" rx="18" fill="#111827" />
  <text x="180" y="850" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Suspension Glow</text>
  <text x="180" y="875" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="13">4.6 · 290 votes</text>
  <rect x="430" y="818" width="110" height="38" rx="19" fill="#14b8a6" />
  <text x="455" y="844" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700">+ Voter</text>

